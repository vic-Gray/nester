name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  website:
    name: Website (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter @nester/website build

      - name: Lint website
        run: pnpm --filter @nester/website lint

  intelligence:
    name: Intelligence (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/intelligence
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/intelligence/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  dapp-frontend:
    name: Dapp Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dapp/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  dapp-backend:
    name: Dapp Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dapp/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/dapp/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache: true

      - name: Test
        run: go test ./...

  internal-stellar:
    name: Internal (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Go module
        id: check
        run: |
          if [ -f "go.mod" ] && [ -d "internal" ]; then
            echo "has_module=true" >> $GITHUB_OUTPUT
          else
            echo "has_module=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-go@v5
        if: steps.check.outputs.has_module == 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        if: steps.check.outputs.has_module == 'true'
        run: go test -v -race ./internal/...

      - name: Check formatting
        if: steps.check.outputs.has_module == 'true'
        run: |
          if [ "$(gofmt -s -l ./internal | wc -l)" -gt 0 ]; then
            echo "Code formatting issues found"
            gofmt -s -d ./internal
            exit 1
          fi

      - name: Run vet
        if: steps.check.outputs.has_module == 'true'
        run: go vet ./internal/...

  contracts:
    name: Contracts (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Test contracts
        run: cargo test --lib
